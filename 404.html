<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Page not found. Return to Aevan Digital to explore our digital engineering and marketing services.">
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#060b18">
  <title>404 - Page Not Found | Aevan Digital</title>
  <link rel="icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Syne:wght@400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <canvas id="particleCanvas" aria-hidden="true"></canvas>

  <nav class="navbar" id="navbar">
    <a href="index.html" class="logo">
      <img src="logo.png" alt="Aevan Digital Logo" style="height: 40px; object-fit: contain;">
    </a>
  </nav>

  <div id="scroll-wrapper" data-scroll-container>
    <main id="app-root">
      <div class="page-content" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center;">
        <section class="container fade-in-up">
           <h1 style="font-family:var(--font-display); font-size: clamp(6rem, 15vw, 10rem); line-height: 1; color: var(--brand-blue); opacity: 0.2; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: -1; pointer-events: none;">404</h1>
           <span class="pill-label">ERROR 404</span>
           <h2 style="font-family:var(--font-display); font-size: clamp(2rem, 5vw, 3.5rem); margin-top: 24px;">Lost in <span class="text-glow" data-text="Digital Space">Digital Space</span></h2>
           <p style="color:var(--txt2); font-size: 1.25rem; margin-top:32px; max-width: 500px; margin-left: auto; margin-right: auto; line-height: 1.6;">The page you are looking for doesn't exist or has been moved to a new coordinate.</p>
           
           <div style="margin-top: 60px;">
              <a href="index.html" class="btn-primary magnetic-btn">
                 <span class="btn-text">Return to Earth</span>
                 <div class="btn-bloom"></div>
              </a>
           </div>
        </section>
      </div>
    </main>

    <footer class="footer">
      <div class="footer-bottom">
        <div>&copy; 2026 Aevan Digital. All rights reserved.</div>
      </div>
    </footer>
  </div>

  <script src="main.js"></script>
</body>
</html>
